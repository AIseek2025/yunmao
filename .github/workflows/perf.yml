name: perf

# WS baseline 压测（第六轮 D 收尾）：
# - 手动触发：workflow_dispatch
# - 每周一 02:00 UTC（即北京时间 10:00）跑 1 次，并把报告 commit 到 reports/perf/
on:
  workflow_dispatch:
    inputs:
      conns:
        description: '目标连接数（建议 Linux runner ≤ 50000）'
        required: false
        default: '10000'
      duration_secs:
        description: '持续秒'
        required: false
        default: '60'
  schedule:
    - cron: '0 2 * * 1'

jobs:
  ws-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Bump ulimits
        run: |
          ulimit -n 1048576 || true
          sysctl -w net.core.somaxconn=4096 || true

      - name: Run baseline
        env:
          YUNMAO_BENCH_CONNS: ${{ github.event.inputs.conns || '10000' }}
          YUNMAO_BENCH_DURATION_SECS: ${{ github.event.inputs.duration_secs || '60' }}
        run: make perf-baseline

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ws-baseline-${{ github.run_id }}
          path: |
            reports/perf/*.md
            reports/perf/*.json
          retention-days: 30

      # 第七轮（D）：自动 PR 评论摘要。
      - name: Read summary
        id: read_summary
        if: github.event_name == 'pull_request'
        run: |
          latest=$(ls -t reports/perf/ws-baseline-*.md 2>/dev/null | head -n1 || true)
          if [ -n "$latest" ]; then
            echo 'body<<EOF' >>"$GITHUB_OUTPUT"
            echo "### ws-baseline run ${{ github.run_id }}" >>"$GITHUB_OUTPUT"
            head -n 60 "$latest" >>"$GITHUB_OUTPUT"
            echo 'EOF' >>"$GITHUB_OUTPUT"
          fi
      - name: Comment perf summary on PR
        if: github.event_name == 'pull_request' && steps.read_summary.outputs.body != ''
        uses: peter-evans/create-or-update-comment@v3
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.read_summary.outputs.body }}

      - name: Commit weekly report (scheduled only)
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "yunmao-perf-bot"
          git config user.email "perf-bot@users.noreply.github.com"
          git add reports/perf/*.md
          if ! git diff --staged --quiet; then
            git commit -m "perf(ws): weekly baseline $(date -u +%Y%m%d)"
            git push
          fi
