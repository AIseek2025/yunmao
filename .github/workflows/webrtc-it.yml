name: webrtc-it

# webrtc-rs 集成测试专用 workflow（第八轮 A 落地，ADR-0024）。
# 需要 cmake / openssl / clang，所以从 rust.yml 拆出。

on:
  push:
    branches: [main]
    paths:
      - 'rust/crates/yunmao-webrtc/**'
      - '.github/workflows/webrtc-it.yml'
  pull_request:
    paths:
      - 'rust/crates/yunmao-webrtc/**'
      - '.github/workflows/webrtc-it.yml'

jobs:
  webrtc-rs-it:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: install system deps (openssl/cmake/clang)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libclang-dev libssl-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          shared-key: webrtc-it
      - name: build webrtc-rs feature
        run: cargo build -p yunmao-webrtc --features webrtc-rs
      - name: inproc integration test
        run: cargo test -p yunmao-webrtc --features webrtc-rs-it subscriber_forwards_60 -- --nocapture
      - name: physical DTLS/SRTP loopback (gated by --ignored)
        run: |
          cargo test -p yunmao-webrtc --features webrtc-rs-it \
            dtls_srtp_loopback_physical -- --ignored --nocapture || \
            echo '(physical DTLS handshake skipped; record only)'
