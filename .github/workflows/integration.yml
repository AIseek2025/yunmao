name: integration

# 端到端集成跑（第六轮 D 收尾）：
# - 起 dev infra（postgres/redis/kafka/emqx），跑 go/test/e2e -tags=integration。
# - 已存在的 go.yml::integration job 已覆盖；本 workflow 是"一键拉环境 + 报告归档"包装，
#   主要给手动触发使用（push/PR 默认走 go.yml::integration 节省 runner 时间）。
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'go/test/**'
      - 'Makefile'
      - '.github/workflows/integration.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go/test/e2e/go.sum

      - name: Make integration-up
        run: make integration-up

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-${{ github.run_id }}
          path: reports/integration/
          retention-days: 30

      # 第七轮（D）：PR 时把 integration JSON 摘要回评到 PR。
      - name: Comment integration summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v3
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### integration run `${{ github.run_id }}`
            Artifact: `integration-${{ github.run_id }}` (retention 30d)
            Logs: see actions tab.

