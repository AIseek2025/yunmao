name: proto

on:
  push:
    branches: [main]
    paths:
      - 'proto/**'
      - 'scripts/gen-proto.sh'
      - '.github/workflows/proto.yml'
  pull_request:
    paths:
      - 'proto/**'
      - 'scripts/gen-proto.sh'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq + ajv
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3-yaml
          npm install -g ajv-cli@5
      - run: bash scripts/gen-proto.sh
