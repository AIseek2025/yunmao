name: openapi-contract

on:
  push:
    branches: [main]
    paths:
      - 'go/pkg/yunmao/openapi/**'
      - 'clients/web/**'
      - 'clients/admin/**'
      - 'clients/android/app/src/main/java/live/yunmao/app/model/**'
      - 'clients/ios/YunmaoApp/Sources/YunmaoApp/Models/**'
      - '.github/workflows/openapi-contract.yml'
  pull_request:
    paths:
      - 'go/pkg/yunmao/openapi/**'
      - 'clients/web/**'
      - 'clients/admin/**'
      - 'clients/android/app/src/main/java/live/yunmao/app/model/**'
      - 'clients/ios/YunmaoApp/Sources/YunmaoApp/Models/**'
      - '.github/workflows/openapi-contract.yml'

jobs:
  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go/pkg/yunmao/go.sum
      - name: Validate OpenAPI spec
        working-directory: go/pkg/yunmao
        run: go test ./openapi/... -v -count=1

  gen-typescript-web:
    runs-on: ubuntu-latest
    needs: spec-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - name: Generate TypeScript types (web)
        working-directory: clients/web
        run: pnpm install --frozen-lockfile && pnpm run openapi-gen
      - name: Check generated file exists
        run: test -f clients/web/src/lib/generated-api.ts
      - name: Verify web client compiles
        working-directory: clients/web
        run: pnpm build

  gen-typescript-admin:
    runs-on: ubuntu-latest
    needs: spec-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - name: Generate TypeScript types (admin)
        working-directory: clients/admin
        run: pnpm install --frozen-lockfile && pnpm run openapi-gen
      - name: Check generated file exists
        run: test -f clients/admin/src/lib/generated-api.ts
      - name: Verify admin client compiles
        working-directory: clients/admin
        run: pnpm build

  contract-consistency:
    runs-on: ubuntu-latest
    needs: [gen-typescript-web, gen-typescript-admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - name: Re-generate types in CI (web)
        working-directory: clients/web
        run: pnpm install --frozen-lockfile && pnpm run openapi-gen
      - name: Re-generate types in CI (admin)
        working-directory: clients/admin
        run: pnpm install --frozen-lockfile && pnpm run openapi-gen
      - name: Verify no uncommitted differences (web)
        run: |
          git diff --exit-code clients/web/src/lib/generated-api.ts || \
            (echo "`error: clients/web generated-api.ts is out of date.`" && exit 1)
      - name: Verify no uncommitted differences (admin)
        run: |
          git diff --exit-code clients/admin/src/lib/generated-api.ts || \
            (echo "`error: clients/admin generated-api.ts is out of date.`" && exit 1)
