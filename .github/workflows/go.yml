name: go

on:
  push:
    branches: [main]
    paths:
      - 'go/**'
      - '.github/workflows/go.yml'
  pull_request:
    paths:
      - 'go/**'
      - '.github/workflows/go.yml'

jobs:
  vet-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - pkg/yunmao
          - services/user-svc
          - services/room-svc
          - services/feeding-svc
          - services/device-svc
          - services/billing-svc
          - services/admin-svc
    defaults:
      run:
        working-directory: go/${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go/${{ matrix.module }}/go.sum
      - run: go vet ./...
      - run: go test ./... -count=1

  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0
          working-directory: go
          args: --config=go/.golangci.yml

  # testcontainers-go 集成测试：跑投喂全链路（PG/Redis/Kafka/EMQX 真实容器 + in-process 服务）。
  # 需要 docker；GitHub Actions ubuntu runner 默认带 docker daemon。
  # 平均耗时 4-8 分钟；如果 PR 改动较小可加 `paths` 过滤。
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: go/test/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go/test/e2e/go.sum
      - name: Pull container images (warm cache)
        run: |
          docker pull postgres:15-alpine
          docker pull redis:7-alpine
          docker pull emqx/emqx:5.5.1
          docker pull confluentinc/cp-kafka:7.6.1
      - name: Run integration
        env:
          INTEGRATION: '1'
        run: go test -tags=integration ./... -v -timeout=20m
