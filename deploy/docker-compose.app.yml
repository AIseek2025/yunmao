name: yunmao-app

# yunmao 应用层（Rust + Go）一键起。
# 依赖 docker-compose.dev.yml 提供的 kafka/postgres/redis；通过 --profile app
# 与 dev 复合启动：
#
#   make app-up
#   make app-down
#
# 服务规则：
# - 所有 HTTP 服务在容器内监听 0.0.0.0；端口映射对齐 deploy/observability/prometheus.yml。
# - user-svc / room-svc 默认走 RS256；room-svc / gateway 默认通过 user-svc `/jwks.json` 校验 token。
# - 事件总线一律 Kafka（YUNMAO_EVENT_BUS=kafka）。

services:
  user-svc:
    build:
      context: ../go
      dockerfile: Dockerfile
      args: { SVC: user-svc }
    image: yunmao/user-svc:dev
    container_name: yunmao-user-svc
    environment:
      YUNMAO_USER_LISTEN: ":8101"
      YUNMAO_JWT_ALG: ${YUNMAO_JWT_ALG:-RS256}
      YUNMAO_JWT_RS_KID: ${YUNMAO_JWT_RS_KID:-}
      YUNMAO_JWT_RS_PRIVATE_KEY_PATH: ${YUNMAO_JWT_RS_PRIVATE_KEY_PATH:-}
      YUNMAO_JWT_ISSUER: yunmao.user-svc
      YUNMAO_JWT_AUDIENCE: ${YUNMAO_JWT_AUDIENCE:-yunmao.gateway}
    ports: ["8101:8101"]

  room-svc:
    build:
      context: ../go
      dockerfile: Dockerfile
      args: { SVC: room-svc }
    image: yunmao/room-svc:dev
    container_name: yunmao-room-svc
    environment:
      YUNMAO_ROOM_LISTEN: ":8102"
      YUNMAO_JWT_ALG: ${YUNMAO_JWT_ALG:-RS256}
      YUNMAO_JWT_RS_KID: ${YUNMAO_JWT_RS_KID:-}
      YUNMAO_JWT_RS_PRIVATE_KEY_PATH: ${YUNMAO_JWT_RS_PRIVATE_KEY_PATH:-}
      YUNMAO_JWKS_ENDPOINTS: ${YUNMAO_JWKS_ENDPOINTS:-http://user-svc:8101/jwks.json}
      YUNMAO_JWT_AUDIENCE: ${YUNMAO_JWT_AUDIENCE:-yunmao.gateway}
      YUNMAO_ALLOW_GUEST: "true"
    ports: ["8102:8102"]
    depends_on: [user-svc]

  feeding-svc:
    build:
      context: ../go
      dockerfile: Dockerfile
      args: { SVC: feeding-svc }
    image: yunmao/feeding-svc:dev
    container_name: yunmao-feeding-svc
    environment:
      YUNMAO_FEEDING_LISTEN: ":8201"
      YUNMAO_FEEDING_GRPC_LISTEN: ":9203"
      YUNMAO_EVENT_BUS: kafka
      YUNMAO_KAFKA_BROKERS: yunmao-kafka:9092
      YUNMAO_CACHE_BACKEND: redis
      YUNMAO_REDIS_URL: redis://yunmao-redis:6379/0
      YUNMAO_DB_URL: ${YUNMAO_DB_URL:-postgres://yunmao:yunmao@yunmao-postgres:5432/yunmao?sslmode=disable}
    ports: ["8201:8201", "9203:9203"]

  device-svc:
    build:
      context: ../go
      dockerfile: Dockerfile
      args: { SVC: device-svc }
    image: yunmao/device-svc:dev
    container_name: yunmao-device-svc
    environment:
      YUNMAO_DEVICE_LISTEN: ":8103"
      YUNMAO_FEEDING_GRPC_ADDR: feeding-svc:9203
    ports: ["8103:8103"]
    depends_on: [feeding-svc]

  billing-svc:
    build:
      context: ../go
      dockerfile: Dockerfile
      args: { SVC: billing-svc }
    image: yunmao/billing-svc:dev
    container_name: yunmao-billing-svc
    environment:
      YUNMAO_BILLING_LISTEN: ":8104"
    ports: ["8104:8104"]

  admin-svc:
    build:
      context: ../go
      dockerfile: Dockerfile
      args: { SVC: admin-svc }
    image: yunmao/admin-svc:dev
    container_name: yunmao-admin-svc
    environment:
      YUNMAO_ADMIN_LISTEN: ":8105"
    ports: ["8105:8105"]

  chat-svc:
    build:
      context: ../go
      dockerfile: Dockerfile
      args: { SVC: chat-svc }
    image: yunmao/chat-svc:dev
    container_name: yunmao-chat-svc
    environment:
      YUNMAO_CHAT_LISTEN: ":8204"
      YUNMAO_EVENT_BUS: kafka
      YUNMAO_KAFKA_BROKERS: yunmao-kafka:9092
      YUNMAO_CACHE_BACKEND: redis
      YUNMAO_REDIS_URL: redis://yunmao-redis:6379/0
      YUNMAO_DB_URL: ${YUNMAO_DB_URL:-postgres://yunmao:yunmao@yunmao-postgres:5432/yunmao?sslmode=disable}
    ports: ["8204:8204"]
    depends_on: [user-svc]

  media-edge:
    build:
      context: ../rust
      dockerfile: Dockerfile
      args: { BIN: yunmao-media-edge }
    image: yunmao/media-edge:dev
    container_name: yunmao-media-edge
    environment:
      RUST_LOG: info,yunmao=debug
    ports: ["1935:1935", "8080:8080"]

  gateway:
    build:
      context: ../rust
      dockerfile: Dockerfile
      args: { BIN: yunmao-gateway }
    image: yunmao/gateway:dev
    container_name: yunmao-gateway
    environment:
      RUST_LOG: info,yunmao=debug
      YUNMAO_GATEWAY_LISTEN: 0.0.0.0:8090
      YUNMAO_EVENT_BUS: kafka
      YUNMAO_KAFKA_BROKERS: yunmao-kafka:9092
      YUNMAO_JWKS_ENDPOINTS: ${YUNMAO_JWKS_ENDPOINTS:-http://user-svc:8101/jwks.json}
      YUNMAO_JWT_SECRET: ${YUNMAO_JWT_SECRET:-}
      # 网关在订阅时只校验签名 + room 字段，不强校验 issuer：
      # user-svc/room-svc 共用 secret，但 issuer 不同。
      YUNMAO_GATEWAY_ALLOW_GUEST: "true"
      YUNMAO_GATEWAY_GUEST_ROOMS: room_demo
    ports: ["8090:8090"]

  device-edge:
    build:
      context: ../rust
      dockerfile: Dockerfile
      args: { BIN: yunmao-device-edge }
    image: yunmao/device-edge:dev
    container_name: yunmao-device-edge
    environment:
      RUST_LOG: info,yunmao=debug
      YUNMAO_DEVICE_EDGE_LISTEN: 0.0.0.0:8091
      YUNMAO_EVENT_BUS: kafka
      YUNMAO_KAFKA_BROKERS: yunmao-kafka:9092
    ports: ["8091:8091"]

networks:
  default:
    name: yunmao-dev_default
    external: true
