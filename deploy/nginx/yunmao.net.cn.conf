server {
    listen 80;
    listen [::]:80;
    server_name yunmao.net.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name yunmao.net.cn;

    ssl_certificate /etc/letsencrypt/live/yunmao.net.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yunmao.net.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:yunmao_ssl:10m;

    client_max_body_size 20m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    location = /healthz {
        proxy_pass http://127.0.0.1:23000/healthz;
    }

    location = /admin {
        proxy_pass http://127.0.0.1:23100/admin;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:23100;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    location ^~ /admin-api/ {
        rewrite ^/admin-api/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:28105;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    location ^~ /ws {
        proxy_pass http://127.0.0.1:28090/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /live/ {
        proxy_pass http://127.0.0.1:28080;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
    }

    location ^~ /whep/ {
        proxy_pass http://127.0.0.1:28080;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
    }

    location ~ ^/api/v1/rooms/[^/]+/chat {
        proxy_pass http://127.0.0.1:28204;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/v1/feed-requests {
        proxy_pass http://127.0.0.1:28201;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/v1/(orders|pay|wallets) {
        proxy_pass http://127.0.0.1:28104;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/v1/(auth|users) {
        proxy_pass http://127.0.0.1:28101;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/v1/rooms {
        proxy_pass http://127.0.0.1:28102;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:23000;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }
}
