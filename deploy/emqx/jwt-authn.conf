# EMQX 5 JWT 认证配置示例（device-svc 签发，RS256 + JWKS）。
# 与 ADR-0017 一致：JWKS 通过 device-svc /jwks.json 暴露，每个 kid 即可独立校验。
#
# 部署：把该片段合并进 etc/emqx.conf，或放在 etc/cluster.d/jwt-authn.conf 让 EMQX hocon 合并。

authentication = [
  {
    mechanism = "jwt"
    use_jwks = true
    endpoint = "http://device-svc:8085/jwks.json"
    refresh_interval = 300            # JWKS 缓存 5 分钟
    verify_claims {
      "iss" = "yunmao.device-svc"
      "aud" = "yunmao.emqx"
      "scope" = "device"
    }
    # 把 JWT 的 sub claim 当做 clientid 必须等价 device_id
    from = "password"
    # 失败时丢弃连接（与 username 校验一致）
    failure_action = "deny"
  }
]

# ACL：允许设备发布 device/$clientid/event/+，订阅 device/$clientid/cmd/+
authorization {
  no_match = deny
  deny_action = ignore
  sources = [
    {
      type = "built_in_database"
    },
    {
      type = "jwt_claims"
      claims = ["topics"]      # 也可在 token 里放 topics claim 覆写默认 ACL（可选）
    }
  ]
}
