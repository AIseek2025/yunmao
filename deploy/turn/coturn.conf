# coturn 配置：yunmao TURN（time-limited credentials, draft-uberti-rtcweb-turn-rest-00）
#
# 部署形态：单实例 coturn（dev / staging）；prod 应 ≥ 2 实例 + L4 LB（5349/tls + 3478/udp）。
# secret 通过 STATIC_AUTH_SECRET env 由 docker-compose 注入；room-svc 通过 KeyProvider
# 派生相同的 secret 用于签发 username/credential，see go/services/room-svc/internal/turn/。

# 监听端口
listening-port=3478
tls-listening-port=5349
alt-listening-port=0
alt-tls-listening-port=0

# 监听地址；docker 网络内绑 0.0.0.0；prod 用外网 IP。
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=${COTURN_EXTERNAL_IP:-127.0.0.1}

# Realm / fingerprint
realm=yunmao.local
fingerprint
no-multicast-peers

# RFC 7635 / draft-uberti-rtcweb-turn-rest-00：time-limited shared secret 模式。
use-auth-secret
static-auth-secret=${COTURN_STATIC_AUTH_SECRET}

# Relay 端口范围（与 docker-compose 端口映射保持一致）。
min-port=49160
max-port=49200

# 安全：阻塞内网与未知段防止 SSRF。
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# TLS 证书（prod 用 LetsEncrypt；dev compose 不映射）
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/key.pem

# 日志
log-file=stdout
verbose

# Prometheus exporter 联调端口
prometheus
