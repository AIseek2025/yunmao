global:
  scrape_interval: 10s
  evaluation_interval: 10s

# 第四轮：加载 alert rules。
rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 注意：在 docker-compose 网络内，host.docker.internal 指向宿主。
  - job_name: 'yunmao-media-edge'
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'yunmao-gateway'
    static_configs:
      - targets: ['host.docker.internal:8090']

  - job_name: 'yunmao-device-edge'
    static_configs:
      - targets: ['host.docker.internal:8091']

  - job_name: 'yunmao-feeding-svc'
    static_configs:
      - targets: ['host.docker.internal:8201']

  - job_name: 'yunmao-user-svc'
    static_configs:
      - targets: ['host.docker.internal:8101']

  - job_name: 'yunmao-room-svc'
    static_configs:
      - targets: ['host.docker.internal:8102']

  - job_name: 'yunmao-device-svc'
    static_configs:
      - targets: ['host.docker.internal:8103']

  - job_name: 'yunmao-admin-svc'
    static_configs:
      - targets: ['host.docker.internal:8105']

  - job_name: 'yunmao-billing-svc'
    static_configs:
      - targets: ['host.docker.internal:8104']
